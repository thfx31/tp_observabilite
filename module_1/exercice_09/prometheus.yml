global:
  scrape_interval: 10s
  external_labels:
    environment: lab

rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/alerts/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["172.17.0.5:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "demo-api"
    static_configs:
      - targets: ["172.17.0.4:8000"]