global:
  scrape_interval: 10s
  external_labels:
    environment: lab

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "demo-api"
    static_configs:
      - targets: ["172.17.0.4:8000"]